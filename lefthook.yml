pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*"
      run: uv run ruff check
    test:
      glob: "*"
      run: uv run python -m unittest discover -s tests

pre-push:
  parallel: true
  commands:
    lint:
      glob: "*"
      run: uv run ruff check
    test:
      glob: "*"
      run: uv run python -m unittest discover -s tests
